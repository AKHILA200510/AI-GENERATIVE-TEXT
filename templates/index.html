<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        #chat-box {
            height: 300px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .msg {
            margin: 8px 0;
        }

        .user {
            text-align: right;
            color: #38bdf8;
        }

        .bot {
            text-align: left;
            color: #22c55e;
        }

        input {
            width: 75%;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 20%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>AI Chat</h2>
    <div id="chat-box"></div>

    <input type="text" id="message" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("message");
    const chatBox = document.getElementById("chat-box");

    const message = input.value.trim();
    if (!message) return;

    chatBox.innerHTML += `<div class="msg user">${message}</div>`;
    input.value = "";

    const res = await fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    if (data.response) {
        chatBox.innerHTML += `<div class="msg bot">${data.response}</div>`;
    } else {
        chatBox.innerHTML += `<div class="msg bot">Error: ${data.error}</div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
